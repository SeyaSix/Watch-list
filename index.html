<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ma Watchlist</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">
    <header>
      <h1>🎬 Ma Watchlist by SeyaSix</h1>
      <p class="subtitle">Films & Séries à regarder</p>

    
      <div class="settings-wrapper" id="settings-wrapper">
        <button class="btn-settings" id="btn-settings" title="Paramètres">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="settings-menu" id="settings-menu">
          <button class="settings-item" id="btn-export">
            <span class="settings-icon">↑</span> Exporter (JSON)
          </button>
          <button class="settings-item" id="btn-import">
            <span class="settings-icon">↓</span> Importer (JSON)
          </button>
        </div>
        <input type="file" id="import-file-input" accept=".json" style="display:none" />
      </div>
    </header>

   <!-- tabs -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="film">Films</button>
      <button class="tab-btn" data-tab="serie">Séries</button>
    </nav>

 <!-- tab films -->
    <section class="tab-content active" id="tab-film">
      <div class="tab-header">
        <h2>Mes Films</h2>
        <div class="header-actions" id="actions-film">
          <button class="btn-toggle-view" id="btn-toggle-film" data-type="film">✓ Vus</button>
          <button class="btn-select" id="btn-select-film">Sélectionner</button>
          <button class="btn-add" id="btn-add-film">+ Ajouter un film</button>
        </div>
        <div class="selection-bar" id="selbar-film">
          <span class="sel-count" id="selcount-film">0 sélectionné</span>
          <div class="selbar-btns">
            <button class="btn-selcancel" id="btn-selcancel-film">Annuler</button>
            <button class="btn-seldel" id="btn-seldel-film" disabled>Supprimer</button>
          </div>
        </div>
      </div>
      <div class="filter-bar" id="filter-film">
        <button class="filter-chip active" data-cat="tous">Tous</button>
        <button class="filter-chip" data-cat="horreur">Horreur</button>
        <button class="filter-chip" data-cat="comedie">Comédie</button>
        <button class="filter-chip" data-cat="action">Action / Aventure</button>
        <button class="filter-chip" data-cat="drame">Drame</button>
        <button class="filter-chip" data-cat="animation">Animation</button>
        <button class="filter-chip" data-cat="SF">SF</button>
      </div>
      <div class="cards-grid" id="grid-film"></div>
      <p class="empty-msg" id="empty-film">Aucun film pour l'instant. Ajoutez-en un !</p>
    </section>

    <!-- Tab Séries -->
    <section class="tab-content" id="tab-serie">
      <div class="tab-header">
        <h2>Mes Séries</h2>
        <div class="header-actions" id="actions-serie">
          <button class="btn-toggle-view" id="btn-toggle-serie" data-type="serie">✓ Vus</button>
          <button class="btn-select" id="btn-select-serie">Sélectionner</button>
          <button class="btn-add" id="btn-add-serie">+ Ajouter une série</button>
        </div>
        <div class="selection-bar" id="selbar-serie">
          <span class="sel-count" id="selcount-serie">0 sélectionné</span>
          <div class="selbar-btns">
            <button class="btn-selcancel" id="btn-selcancel-serie">Annuler</button>
            <button class="btn-seldel" id="btn-seldel-serie" disabled>Supprimer</button>
          </div>
        </div>
      </div>
      <div class="filter-bar" id="filter-serie">
        <button class="filter-chip active" data-cat="tous">Tous</button>
        <button class="filter-chip" data-cat="horreur">Horreur</button>
        <button class="filter-chip" data-cat="comedie">Comédie</button>
        <button class="filter-chip" data-cat="action">Action / Aventure</button>
        <button class="filter-chip" data-cat="drame">Drame</button>
        <button class="filter-chip" data-cat="animation">Animation</button>
        <button class="filter-chip" data-cat="SF">SF</button>

      </div>
      <div class="cards-grid" id="grid-serie"></div>
      <p class="empty-msg" id="empty-serie">Aucune série pour l'instant. Ajoutez-en une !</p>
    </section>
  </div>


  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modal-title">Ajouter</h3>
      <input
        type="text"
        id="modal-input"
        placeholder="Entrez un nom..."
        maxlength="100"
        autocomplete="off"
      />
      <div class="modal-field">
        <label class="modal-label">Catégories <span class="optional">(max 3)</span></label>
        <div class="cat-chips" id="modal-cat-chips">
          <button type="button" class="cat-chip" data-value="horreur">Horreur</button>
          <button type="button" class="cat-chip" data-value="comedie">Comédie</button>
          <button type="button" class="cat-chip" data-value="action">Action / Aventure</button>
          <button type="button" class="cat-chip" data-value="drame">Drame</button>
          <button type="button" class="cat-chip" data-value="animation">Animation</button>
          <button type="button" class="cat-chip" data-value="SF">SF</button>
        </div>
      </div>
      <div class="modal-field modal-field--small">
        <label class="modal-label" for="modal-year">Année <span class="optional">(optionnel)</span></label>
        <input
          type="number"
          id="modal-year"
          placeholder="ex : 2023"
          min="1900"
          max="2099"
          autocomplete="off"
        />
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">Annuler</button>
        <button class="btn-confirm" id="btn-confirm">Ajouter</button>
      </div>
    </div>
  </div>


  <div class="detail-overlay" id="detail-overlay">
    <div class="detail-modal" role="dialog" aria-modal="true">

      <div class="detail-header">
        <h3 class="detail-title" id="detail-title"></h3>
        <div class="detail-meta">
          <span class="category-badge detail-badge" id="detail-badge"></span>
          <span class="detail-year" id="detail-year"></span>
        </div>
      </div>

      <div class="detail-divider"></div>

      <div class="detail-body">

        <div class="detail-row">
          <span class="detail-label">Note</span>
          <div class="stars" id="detail-stars">
            <button class="star" data-value="1">★</button>
            <button class="star" data-value="2">★</button>
            <button class="star" data-value="3">★</button>
            <button class="star" data-value="4">★</button>
            <button class="star" data-value="5">★</button>
          </div>
        </div>

        <div class="detail-row">
          <span class="detail-label">Statut</span>
          <button class="btn-vu" id="btn-vu">
            <span class="vu-icon">✓</span>
            <span class="vu-label">Marquer comme vu</span>
          </button>
        </div>

      </div>

      <div class="detail-footer">
        <button class="btn-find" id="btn-find">🔍 Trouver</button>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
